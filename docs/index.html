<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimeHopper - Effortless Time Zone Management</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(to right, #fcc934, #f89156, #fd547a, #4494aa, #526ea1);
            color: #333;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            text-align: center;
            max-width: 600px;
            width: 90%;
            margin-top: 60px;
        }

        h1 {
            margin-bottom: 10px;
            color: #333;
        }

        p {
            line-height: 1.6;
            color: #666;
            font-size: 1.1em;
        }

        .btn {
            display: inline-block;
            background: #4CAF50;
            color: white;
            padding: 15px 30px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: bold;
            margin-top: 20px;
            transition: transform 0.2s;
        }

        .btn:hover {
            transform: scale(1.05);
            background: #45a049;
        }

        footer {
            margin-top: 40px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.9em;
            padding-bottom: 20px;
        }

        footer a {
            color: white;
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- You can replace this with your icon image later -->
        <div style="font-size: 60px; margin-bottom: 20px;">🐰🕒</div>

        <h1>TimeHopper</h1>
        <p>A unified scheduling dashboard for distributed teams. Coordinate across time zones, view your Google
            Calendar, and get meeting alerts without leaving your current tab.</p>

        <a href="https://chromewebstore.google.com/detail/timehopper-effortless-tim/fdbmmaofgpcaglohaddoedbkcadjdjnl"
            class="btn">Download on Chrome Web Store</a>
    </div>

    <footer>
        <p>&copy; 2026 TimeHopper. All rights reserved.</p>
        <p><a href="privacy.html">Privacy Policy</a> | <a href="terms.html">Terms of Service</a></p>
    </footer>
</body>

</html>
